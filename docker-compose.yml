version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: idp-postgres
    environment:
      POSTGRES_DB: idp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"

  backend:
    build: .
    container_name: idp-backend
    ports:
      - "8080:8080"
    volumes:
      - ./repos:/app/repos      
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/idp
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres